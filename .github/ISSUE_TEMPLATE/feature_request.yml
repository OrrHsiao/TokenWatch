name: Feature request
description: Suggest an AI Token Watch improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
      placeholder: I want to understand...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like AI Token Watch to do?
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Data source
      description: Which provider or data format is relevant?
      placeholder: Claude Code, Codex, opencode, another tool
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. What else could solve this?
