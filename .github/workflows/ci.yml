name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: macOS Unit Tests
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Run Unit Tests
        run: |
          xcodebuild \
            -project TokenWatch.xcodeproj \
            -scheme TokenWatch \
            -destination 'platform=macOS' \
            -only-testing:TokenWatchTests \
            -derivedDataPath "$RUNNER_TEMP/TokenWatchDerivedData" \
            test

