name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "27 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analyze
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        language:
          - swift

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Build
        run: |
          xcodebuild \
            -project TokenWatch.xcodeproj \
            -scheme TokenWatch \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/TokenWatchCodeQLDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
